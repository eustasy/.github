name: ✨ Enhancement
description: Suggest an idea, an improvement, or new functionality.
type: ✨ Enhancement
body:
  - type: textarea
    id: proposal
    attributes:
      label: What would you like?
      description: Describe the idea and the problem it solves.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
    validations:
      required: false
